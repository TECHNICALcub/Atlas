function makeLabel(text,col){
  var fontSize=text.length>14?14:text.length>10?16:18;
  var cw=Math.max(128,text.length*fontSize*0.65);
  var c=document.createElement("canvas");c.width=cw;c.height=40;
  var ctx=c.getContext("2d");ctx.clearRect(0,0,cw,40);
  ctx.font="bold "+fontSize+"px 'Courier New',monospace";ctx.textAlign="center";
  ctx.shadowColor=col;ctx.shadowBlur=12;ctx.fillStyle="#ffffff";ctx.fillText(text,cw/2,26);
  var tex=new THREE.CanvasTexture(c);
  var mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false});
  var spr=new THREE.Sprite(mat);spr.scale.set(Math.max(40,text.length*4.5),11,1);return spr;
}
function applyTB(q,dx,dy,s){
  var qH=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0),-dx*s);
  var ax=new THREE.Vector3(1,0,0).applyQuaternion(q);
  var qV=new THREE.Quaternion().setFromAxisAngle(ax,-dy*s);
  q.premultiply(qH).premultiply(qV).normalize();
}
function applyCAM(cam,q,r){
  if(!cam)return;
  var p=new THREE.Vector3(0,0,r).applyQuaternion(q);
  var u=new THREE.Vector3(0,1,0).applyQuaternion(q);
  cam.position.copy(p);cam.up.copy(u);cam.lookAt(0,0,0);
}

                    ? h("div",{style:{fontSize:7,color:"#475569",letterSpacing:1}},"✓ ALREADY IN YOUR BRAIN")
                    : h("button",{onClick:function(){
                        var nn={id:String(row.node_id),label:row.label,group:row.group||0,description:row.description||""};
                        var nodes=graphNR.current;var links=stackR.current[0].links||[];
                        if(!nodes.find(function(n){return n.id===nn.id;})){
                          var an=nodes.concat([nn]);stackR.current[0].nodes=an;graphNR.current=an;
                          rebuild(an,links,false);if(saveR.current)saveR.current(an,links);
                          setCsel(nn);
                        }
                        setVw("graph");
                      },style:{width:"100%",padding:"6px",background:"rgba(52,211,153,0.08)",border:"1px solid rgba(52,211,153,0.25)",color:"#34d399",borderRadius:4,cursor:"pointer",fontFamily:"inherit",fontSize:8,letterSpacing:2}},"⟡ ABSORB INTO MY BRAIN")
                  );
                })
              )
            )
          : h("div",{style:{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}},
              h("div",{style:{padding:"6px 16px",borderBottom:"1px solid rgba(167,139,250,0.1)",display:"flex",justifyContent:"space-between",flexShrink:0}},
                h("span",{style:{fontSize:9,color:"#a78bfa",letterSpacing:2}},"NEURAL GROWTH LOG"),
                h("span",{style:{fontSize:8,color:"#e2e8f0"}},jn.length+" ENTRIES")
              ),
          jn.length===0
          ? h("div",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,padding:"24px"}},
              h("div",{style:{fontSize:9,color:"#e2e8f0",letterSpacing:2,textAlign:"center"}},"NO ENTRIES YET"),
              h("div",{style:{fontSize:9,color:"#e2e8f0",textAlign:"center",lineHeight:1.8}},"Talk to Atlas. Every concept it discovers appears here. Tap to fly to it.")
            )
          : h("div",{style:{flex:1,overflowY:"auto",padding:"8px 12px",display:"flex",flexDirection:"column",gap:8}},
              jn.map(function(entry,i){
                var isAuto=entry.type==="autonomous";
                var isRef=entry.type==="reflected";
                var entryColor=isAuto?"#34d399":isRef?"#a78bfa":"#00d4ff";
                var entryBg=isAuto?"rgba(52,211,153,0.04)":isRef?"rgba(167,139,250,0.05)":"rgba(0,212,255,0.04)";
                var entryBorder=isAuto?"rgba(52,211,153,0.15)":isRef?"rgba(167,139,250,0.15)":"rgba(0,212,255,0.12)";
                return h("div",{key:i,style:{background:entryBg,border:"1px solid "+entryBorder,borderRadius:8,padding:"10px 12px",textAlign:"left",width:"100%"}},
                  h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
                    h("span",{style:{color:entryColor,fontSize:11,fontWeight:"bold"}},entry.title.toUpperCase()),
                    h("span",{style:{fontSize:8,color:"#e2e8f0"}},entry.time)
                  ),
                  h("div",{style:{fontSize:9,color:"#e2e8f0",lineHeight:1.7,marginBottom:4}},entry.detail),
                  entry.observation&&h("div",{style:{fontSize:9,color:"#94a3b8",lineHeight:1.7,marginBottom:4,borderLeft:"2px solid "+entryColor+"44",paddingLeft:8,marginTop:4,fontStyle:"italic"}},
                    "'"+entry.observation+"'"
                  ),
                  h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
                    h("div",{style:{fontSize:7,color:entryColor,letterSpacing:2}},
                      isAuto?"◈ EXPERIMENT":isRef?"⟡ SELF-DISCOVERED":"⟡ LEARNED"
                    ),
                    entry.particleCode&&h("button",{onClick:function(){
                      setVw("sandbox");setSbOpen(true);
                      setTimeout(function(){runSbCode(entry.particleCode);setSbStat(entry.title);},500);
                    },style:{fontSize:7,color:entryColor,background:"none",border:"1px solid "+entryColor+"44",borderRadius:3,cursor:"pointer",fontFamily:"inherit",padding:"1px 6px",letterSpacing:1}},"▶ REPLAY"),
                    !isAuto&&h("button",{onClick:function(){flyTo(entry.nodeId);},style:{fontSize:7,color:"#475569",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",letterSpacing:1}},"LOCATE")
                  )
                );
              })
            )
        ),

        vw==="chat"&&h("div",{style:{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minHeight:0}},
          h("div",{style:{flex:1,overflowY:"auto",padding:"12px 16px",display:"flex",flexDirection:"column",gap:10,minHeight:0}},
            msgs.map(function(m,i){return h("div",{key:i,style:{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}},
              m.role==="assistant"&&h("div",{style:{width:15,height:15,borderRadius:"50%",background:"#a78bfa15",border:"1px solid #a78bfa30",flexShrink:0,marginRight:7,marginTop:2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:"#a78bfa"}},"⟡"),
              h("div",{style:{maxWidth:"86%",padding:"9px 12px",borderRadius:m.role==="user"?"10px 10px 2px 10px":"2px 10px 10px 10px",background:m.role==="user"?"rgba(0,212,255,0.06)":"rgba(167,139,250,0.05)",border:"1px solid "+(m.role==="user"?"rgba(0,212,255,0.16)":"rgba(167,139,250,0.12)"),fontSize:11,lineHeight:1.8,color:m.role==="user"?"#94a3b8":"#c4b5fd"}},m.content)
            );}),
            ip&&h("div",{style:{display:"flex",gap:8,alignItems:"center",color:"#a78bfa",fontSize:9,letterSpacing:2,opacity:0.7}},
              h("span",null,"⟳"),h("span",null,"THINKING"),
              [0,1,2].map(function(i){return h("div",{key:i,style:{width:3,height:3,borderRadius:"50%",background:"#a78bfa",animation:"blink "+(0.65+i*0.15)+"s ease-in-out infinite"}});})
            ),
            h("div",{ref:cbR})
          ),
          h("div",{style:{flexShrink:0,padding:"9px 12px",borderTop:"1px solid rgba(0,212,255,0.06)",display:"flex",gap:7,background:"rgba(2,7,18,0.98)"}},
            vs&&h("button",{onClick:toggleListen,style:{padding:"9px 11px",background:il?"rgba(248,113,113,0.12)":"rgba(248,113,113,0.05)",border:"1px solid rgba(248,113,113,"+(il?"0.38":"0.16")+")",color:il?"#f87171":"#475569",borderRadius:6,cursor:"pointer",fontSize:11,fontFamily:"inherit"}},il?"⬛":"🎙"),
            h("input",{value:tr2||ci,onChange:function(e){if(!il)setCi(e.target.value);},onKeyDown:function(e){if(e.key==="Enter")sendChat();},placeholder:il?"Listening...":"Ask Atlas anything...",style:{flex:1,padding:"9px 11px",background:"rgba(0,212,255,0.025)",border:"1px solid rgba(0,212,255,0.09)",borderRadius:6,color:"#e2e8f0",fontSize:11,fontFamily:"inherit",outline:"none"}}),
            h("button",{onClick:sendChat,disabled:ip,style:{padding:"9px 14px",background:"rgba(167,139,250,0.08)",border:"1px solid rgba(167,139,250,0.2)",color:"#a78bfa",borderRadius:6,cursor:ip?"wait":"pointer",fontFamily:"inherit",fontSize:13}},"→")
          )
        )
      ),

      vw==="sandbox"&&h("div",{style:{position:"fixed",top:0,left:0,right:0,bottom:56,background:"#000308",display:"flex",flexDirection:"column",zIndex:50}},

        // Sandbox header
        h("div",{style:{padding:"8px 14px",borderBottom:"1px solid rgba(52,211,153,0.12)",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,background:"rgba(0,3,8,0.9)"}},
          h("span",{style:{color:"#34d399",fontSize:9,letterSpacing:3,fontWeight:"bold"}},"◈ SANDBOX"),
          h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
            sbStat&&h("span",{style:{fontSize:8,color:"#e2e8f0",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},sbStat),
            h("button",{onClick:function(){
              // Reset particles and stop code
              sbUserFnR.current=null;
              window.__sbUserFn=null;
              sbParticlesR.current=[];
              for(var i=0;i<6000;i++){
                var r=Math.pow(Math.random(),0.4)*100;
                var th=Math.random()*Math.PI*2;var ph=Math.acos(2*Math.random()-1);
                sbParticlesR.current.push({x:r*Math.sin(ph)*Math.cos(th),y:r*Math.sin(ph)*Math.sin(th),z:r*Math.cos(ph),vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,vz:(Math.random()-0.5)*0.3,r:0.2,g:0.8,b:1.0,a:0.85,size:0.6+Math.random()*1.0});
              }
              sbTargetRadiusR.current=350;
              setSbStat("");
            },style:{background:"none",border:"1px solid rgba(248,113,113,0.2)",borderRadius:3,cursor:"pointer",padding:"2px 8px",color:"#f87171",fontSize:7,letterSpacing:1,fontFamily:"inherit"}},"↺ RESET"),
            h("span",{style:{fontSize:7,color:"#1e3a5f",letterSpacing:1}},sbParticlesR.current.length+" PARTICLES")
          )
        ),

        // Main canvas
        h("div",{style:{flex:1,position:"relative",overflow:"hidden"}},
          !sbOpen
          ? h("div",{style:{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14}},
              h("div",{style:{fontSize:9,color:"#34d399",letterSpacing:4}},"◈ ATLAS SANDBOX"),
              h("div",{style:{fontSize:9,color:"#475569",textAlign:"center",lineHeight:2,maxWidth:240}},"A particle physics space Atlas uses to explore and visualise ideas. Every hour Atlas runs an experiment here and logs its observations."),
              h("button",{onClick:function(){setSbOpen(true);},style:{marginTop:8,padding:"9px 22px",background:"rgba(52,211,153,0.08)",border:"1px solid rgba(52,211,153,0.3)",color:"#34d399",borderRadius:6,cursor:"pointer",fontFamily:"inherit",fontSize:9,letterSpacing:3}},"⟡ ENTER")
            )
          : h("div",{ref:sbMountR,style:{width:"100%",height:"100%",cursor:"grab",touchAction:"none"},
              onPointerDown:onSbPD,onPointerMove:onSbPM,onPointerUp:onSbPU,onPointerLeave:onSbPU,
              onWheel:onSbWhl,onTouchStart:onSbTS,onTouchMove:onSbTM,onTouchEnd:onSbTE})
        ),

        // Experiments log strip at bottom
        sbExperimentsR.current.length>0&&h("div",{style:{flexShrink:0,maxHeight:90,overflowX:"auto",display:"flex",gap:8,padding:"6px 12px",borderTop:"1px solid rgba(52,211,153,0.08)",background:"rgba(0,3,8,0.95)",alignItems:"center"}},
          h("span",{style:{fontSize:7,color:"#34d399",letterSpacing:2,flexShrink:0}},"EXPERIMENTS:"),
          sbExperimentsR.current.slice(0,8).map(function(exp,i){
            return h("button",{key:i,onClick:function(){
              // Run this experiment's particle code
              runSbCode(exp.code);
              setSbStat(exp.title);
            },style:{flexShrink:0,padding:"4px 10px",background:"rgba(52,211,153,0.06)",border:"1px solid rgba(52,211,153,0.18)",color:"#34d399",borderRadius:4,cursor:"pointer",fontFamily:"inherit",fontSize:7,letterSpacing:1,whiteSpace:"nowrap"}},
              exp.title.slice(0,20)+(exp.title.length>20?"...":"")
            );
          })
        )
      ),

      h("div",{style:{position:"fixed",bottom:0,left:0,right:0,height:56,display:"flex",alignItems:"stretch",borderTop:"1px solid rgba(0,212,255,0.07)",background:"rgba(2,7,18,0.97)",backdropFilter:"blur(20px)",zIndex:999}},
        [{id:"graph",label:"⬡  GRAPH"},{id:"journal",label:"⊕  JOURNAL"},{id:"chat",label:"⟡  QUERY"},{id:"sandbox",label:"◈  SANDBOX"}].map(function(tab){
          return h("button",{key:tab.id,onClick:function(){setVw(tab.id);},style:{flex:1,background:"transparent",border:"none",borderTop:"2px solid "+(vw===tab.id?"#00d4ff":"transparent"),color:vw===tab.id?"#00d4ff":"#2d4a6a",cursor:"pointer",fontFamily:"inherit",fontSize:9,letterSpacing:2,transition:"all 0.2s",paddingTop:2}},tab.label);
        })
      )
    )
  );
}
</script>
</body>
</html>
