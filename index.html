function initAtlas(){
  try {
    var inp=document.getElementById("apiKey");
    if(!inp){alert("ERROR: apiKey input not found");return;}
    var key=inp.value.trim();
    alert("Key entered: "+(key?key.slice(0,8)+"...":"EMPTY")+" starts with gsk_: "+key.startsWith("gsk_"));
    if(!key.startsWith("gsk_")){alert("Invalid key format");return;}
    window.__K__=key;
    localStorage.setItem("atlas_key",key);
    alert("Key saved. Launching...");
    launch();

    alert("initAtlas error: "+e.message);
