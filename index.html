<script>
const SUPABASE_URL = "https://zvujnkppvdwfpvczqnbc.supabase.co";
const SUPABASE_KEY = "sb_publishable_uPcHMh53kGtcNEa2vpHnug_WC_JN2lb";

const atlasLocalStorage = {
  get: async function(key) {
    try {
      var res = await fetch(SUPABASE_URL+"/rest/v1/atlas_brain?id=eq."+encodeURIComponent(key)+"&select=data", {
        headers: {"apikey": SUPABASE_KEY, "Authorization": "Bearer "+SUPABASE_KEY}
      });
      var rows = await res.json();
      if (rows && rows.length > 0 && rows[0].data) {
        try { localStorage.setItem("atlas__"+key, rows[0].data); } catch(e) {}
        return {value: rows[0].data};
      }
    } catch(e) {}
    try {
      var local = localStorage.getItem("atlas__"+key);
      if (local) return {value: local};
    } catch(e) {}
    return null;
  },
  set: async function(key, value) {
    try {
      await fetch(SUPABASE_URL+"/rest/v1/atlas_brain", {
        method: "POST",
        headers: {"apikey": SUPABASE_KEY, "Authorization": "Bearer "+SUPABASE_KEY, "Content-Type": "application/json", "Prefer": "resolution=merge-duplicates"},
        body: JSON.stringify({id: key, data: value, updated_at: new Date().toISOString()})
      });
    } catch(e) {}
    try { localStorage.setItem("atlas__"+key, value); } catch(e) {}
    return {key: key, value: value};
  }
};

function initAtlas() {
  var key = document.getElementById("apiKey").value.trim();
  if (!key.startsWith("gsk_")) { alert("Please enter a valid Groq key starting with gsk_"); return; }
  window.__ATLAS_KEY__ = key;
  localStorage.setItem("atlas_key", key);
  launch();
}

function launch() {
  document.getElementById("setup").style.display = "none";
  document.getElementById("root").style.display = "block";
  setTimeout(function() {
    if (typeof window.AtlasApp !== "undefined") {
      ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(window.AtlasApp));
    }
  }, 500);
}

document.getElementById("initBtn").addEventListener("click", initAtlas);
document.getElementById("apiKey").addEventListener("keydown", function(e) { if(e.key==="Enter") initAtlas(); });

window.addEventListener("load", function() {
  var saved = localStorage.getItem("atlas_key") || localStorage.getItem("atlas_api_key");
  if (saved && saved.startsWith("gsk_")) {
    window.__ATLAS_KEY__ = saved;
    launch();
  }
});
</script>

// ── Quaternion trackball ────────────────────────────────────────
function applyTrackballDelta(quat, dx, dy, sens = 0.005) {
  const qH = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), -dx * sens);
  const axisV = new THREE.Vector3(1,0,0).applyQuaternion(quat);
  const qV = new THREE.Quaternion().setFromAxisAngle(axisV, -dy * sens);
  quat.premultiply(qH).premultiply(qV).normalize();
}
function applyCamera(camera, quat, radius) {
  const pos = new THREE.Vector3(0,0,radius).applyQuaternion(quat);
  const up  = new THREE.Vector3(0,1,0).applyQuaternion(quat);
  camera.position.copy(pos);
  camera.up.copy(up);
  camera.lookAt(0,0,0);
}

// ── Label sprite ────────────────────────────────────────────────
function makeLabel(text, colorHex, scale = 1) {
  const c = document.createElement("canvas");
  c.width = 320; c.height = 56;
  const ctx = c.getContext("2d");
  ctx.clearRect(0,0,320,56);
  ctx.font = `bold ${Math.round(20*scale)}px 'Courier New',monospace`;
  ctx.textAlign = "center";
  ctx.shadowColor = colorHex; ctx.shadowBlur = 12;
  ctx.fillStyle = colorHex;
  ctx.fillText(text, 160, 36);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({ map:tex, transparent:true, depthWrite:false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(Math.max(60, text.length*9), 18, 1);
  return sprite;
}

window.AtlasApp = function Atlas() {
  const mountRef    = useRef(null);
  const sceneRef    = useRef(null);
  const cameraRef   = useRef(null);
  const rendererRef = useRef(null);
  const rafRef      = useRef(null);
  const tickRef     = useRef(0);

  // ── Sim state ───────────────────────────────────────────────────
  const simNodesRef      = useRef([]);
  const simAlphaRef      = useRef(1.0);
  const simLinksRef      = useRef([]);
  const linkLinesMeshRef = useRef(null);

  // ── View stack (drill-down) ─────────────────────────────────────
  // Each level: { id, label, nodes:[...], links:[...] }
  const viewStackRef    = useRef([{ id:"root", label:"ATLAS", nodes: SEED_NODES.map(n=>({...n})), links: SEED_LINKS.map(l=>({...l})) }]);
  const subBrainCacheRef = useRef(new Map()); // nodeId → {nodes, links}

  // ── Trackball ───────────────────────────────────────────────────
  const trackRef = useRef({ rotQ: new THREE.Quaternion(), velDx:0, velDy:0, radius:520, dragging:false, lastX:0, lastY:0 });
  const pinchRef       = useRef(null);
  const pointerDownRef = useRef(null);
  const touchDownRef   = useRef(null);
  const raycasterRef   = useRef(new THREE.Raycaster());
  const selectedIdRef  = useRef(null);

  // ── Voice ───────────────────────────────────────────────────────
  const recognitionRef = useRef(null);
  const chatBottomRef  = useRef(null);

  // ── React state ─────────────────────────────────────────────────
  const [selectedNode,  setSelectedNode]  = useState(null);
  const [view,          setView]          = useState("graph");
  const [inputText,     setInputText]     = useState("");
  const [chatInput,     setChatInput]     = useState("");
  const [messages,      setMessages]      = useState([
    {role:"assistant", content:"ATLAS v9 ONLINE. Neural graph active. Autonomous learning enabled — your brain grows with every conversation."}
  ]);
  const [isProcessing,  setIsProcessing]  = useState(false);
  const [isExpanding,   setIsExpanding]   = useState(false);
  const [stats,         setStats]         = useState({nodes: SEED_NODES.length, links: SEED_LINKS.length});
  const [isListening,   setIsListening]   = useState(false);
  const [voiceSupported]                  = useState(()=>"SpeechRecognition" in window||"webkitSpeechRecognition" in window);
  const [voiceEnabled,  setVoiceEnabled]  = useState(true);
  const [transcript,    setTranscript]    = useState("");
  const [searchEnabled, setSearchEnabled] = useState(true);
  const [bootDone,      setBootDone]      = useState(false);
  const [isAutoLearning, setIsAutoLearning] = useState(false);
  const [autoLearnLog,   setAutoLearnLog]   = useState([]);
  const [realTimeCtx,  setRealTimeCtx]  = useState("");
  const [breadcrumbs,   setBreadcrumbs]   = useState([{id:"root",label:"ATLAS"}]);
  const [syncStatus,    setSyncStatus]    = useState("loading"); // loading | synced | saving

  useEffect(()=>{ selectedIdRef.current = selectedNode?.id||null; },[selectedNode]);

  // ── Rebuild Three.js scene objects ─────────────────────────────
  const rebuildGraph = useCallback((nodes, links, resetCamera = false) => {
    const scene = sceneRef.current;
    if (!scene) return;

    const posMap = {};
    simNodesRef.current.forEach(n => {
      posMap[n.id] = {x:n.x,y:n.y,z:n.z,vx:n.vx,vy:n.vy,vz:n.vz};
      scene.remove(n.mesh);     n.mesh?.geometry.dispose();     n.mesh?.material.dispose();
      scene.remove(n.glowMesh); n.glowMesh?.geometry.dispose(); n.glowMesh?.material.dispose();
      if (n.labelSprite){ scene.remove(n.labelSprite); n.labelSprite.material.map?.dispose(); n.labelSprite.material.dispose(); }
    });
    if (linkLinesMeshRef.current){
      scene.remove(linkLinesMeshRef.current);
      linkLinesMeshRef.current.geometry.dispose();
      linkLinesMeshRef.current.material.dispose();
      linkLinesMeshRef.current = null;
    }

    const spread = 200;
    simNodesRef.current = nodes.map(node => {
      const ex = posMap[node.id];
      return { ...node,
        x: ex?.x ?? (Math.random()-0.5)*spread,
        y: ex?.y ?? (Math.random()-0.5)*spread,
        z: ex?.z ?? (Math.random()-0.5)*spread,
        vx: ex?.vx??0, vy:ex?.vy??0, vz:ex?.vz??0
      };
    });

    simNodesRef.current.forEach(node => {
      const isHub   = node.isHub;
      const colorHex= PALETTE[node.group%PALETTE.length];
      const color   = new THREE.Color(colorHex);
      const r       = isHub ? 12 : 6+Math.min(node.label.length*0.28,5);
      node.r = r;

      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(r,20,20),
        new THREE.MeshPhongMaterial({color, emissive:color, emissiveIntensity: isHub?0.6:0.35, shininess:90, transparent:true, opacity:0.95})
      );
      mesh.userData.nodeId = node.id;
      mesh.position.set(node.x,node.y,node.z);
      scene.add(mesh); node.mesh = mesh;

      const glowMesh = new THREE.Mesh(
        new THREE.SphereGeometry(r*2.2,12,12),
        new THREE.MeshBasicMaterial({color, transparent:true, opacity: isHub?0.14:0.07, blending:THREE.AdditiveBlending, depthWrite:false})
      );
      glowMesh.position.copy(mesh.position);
      scene.add(glowMesh); node.glowMesh = glowMesh;

      const labelSprite = makeLabel(node.label, colorHex, isHub?1.3:1);
      labelSprite.position.set(node.x, node.y-r-14, node.z);
      scene.add(labelSprite); node.labelSprite = labelSprite;
    });

    const flatLinks = links.map(l=>({
      source: typeof l.source==="object"?l.source.id:l.source,
      target: typeof l.target==="object"?l.target.id:l.target,
      label: l.label
    }));
    simLinksRef.current = flatLinks;

    const pos = new Float32Array(flatLinks.length*6);
    const col = new Float32Array(flatLinks.length*6);
    flatLinks.forEach((lnk,i)=>{
      const s=simNodesRef.current.find(n=>n.id===lnk.source);
      const t=simNodesRef.current.find(n=>n.id===lnk.target);
      if(!s||!t) return;
      const b=i*6;
      pos[b]=s.x;pos[b+1]=s.y;pos[b+2]=s.z;
      pos[b+3]=t.x;pos[b+4]=t.y;pos[b+5]=t.z;
      const sc=new THREE.Color(PALETTE[(s.group||0)%PALETTE.length]);
      const tc=new THREE.Color(PALETTE[(t.group||0)%PALETTE.length]);
      col[b]=sc.r;col[b+1]=sc.g;col[b+2]=sc.b;
      col[b+3]=tc.r;col[b+4]=tc.g;col[b+5]=tc.b;
    });
    const lGeo=new THREE.BufferGeometry();
    lGeo.setAttribute("position",new THREE.BufferAttribute(pos,3));
    lGeo.setAttribute("color",   new THREE.BufferAttribute(col,3));
    const linesMesh=new THREE.LineSegments(lGeo,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:0.28,blending:THREE.AdditiveBlending,depthWrite:false}));
    scene.add(linesMesh);
    linkLinesMeshRef.current = linesMesh;

    simAlphaRef.current = 1.0;
    if (resetCamera){ trackRef.current.rotQ=new THREE.Quaternion(); trackRef.current.radius=520; if(cameraRef.current) applyCamera(cameraRef.current,trackRef.current.rotQ,trackRef.current.radius); }
    setStats({nodes:nodes.length, links:flatLinks.length});
    setSelectedNode(null);
  }, []);

  // ── Drill INTO a node ────────────────────────────────────────────
  const drillInto = useCallback(async (node) => {
    setIsExpanding(true);
    try {
      let subBrain = subBrainCacheRef.current.get(node.id);

      if (!subBrain) {
        // Generate sub-brain from Atlas
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions",{
          method:"POST", headers:{"Content-Type":"application/json","Authorization":"Bearer "+window.__ATLAS_KEY__},
          body: JSON.stringify({
            model:"llama-3.3-70b-versatile", max_tokens:1200,
            system:`You are generating a deep sub-brain for a knowledge node. Return ONLY valid JSON, no markdown, no backticks.

Format exactly:
{"nodes":[{"id":"PARENT_ID--kebab-child","label":"1-3 Word Name","group":0,"description":"one precise sentence","isHub":false}],"links":[{"source":"id","target":"id","label":"relationship verb"}]}

Rules:
- The FIRST node must have "isHub":true, id="${node.id}", label="${node.label}", and be the central concept
- Generate 5-7 child nodes that are KEY ASPECTS, FACETS, COMPONENTS, or SUB-CONCEPTS of "${node.label}"
- All child node IDs must start with "${node.id}--"
- Create 6-10 links — children should link to the hub AND to each other where meaningful
- Make this feel like a complete standalone brain exploring "${node.label}" deeply
- Groups: 0=systems,1=technology,2=cognition,3=knowledge,4=tools,5=concepts,6=people,7=science
- Return ONLY JSON`,
            messages:[{role:"user",content:`Generate a deep sub-brain for the concept: "${node.label}" — ${node.description||""}`}]
          })
        });
        const data = await res.json();
        const raw  = data.choices?.[0]?.message?.content||"";
        const match = raw.match(/\{[\s\S]*\}/);
        if (!match) throw new Error("No JSON");
        const parsed = JSON.parse(match[0]);

        // Ensure hub node is correct
        const nodes = (parsed.nodes||[]).map(n => n.isHub ? {...n, id:node.id, label:node.label, description:node.description, group:node.group, isHub:true} : n);
        const links = parsed.links||[];

        subBrain = { nodes, links };
        subBrainCacheRef.current.set(node.id, subBrain);
      }

      // Push to view stack
      const stack = viewStackRef.current;
      stack.push({ id:node.id, label:node.label, nodes:subBrain.nodes, links:subBrain.links });
      viewStackRef.current = [...stack];
      setBreadcrumbs(stack.map(l=>({id:l.id,label:l.label})));
      rebuildGraph(subBrain.nodes, subBrain.links, true);
      saveBrain(viewStackRef.current[0].nodes, viewStackRef.current[0].links);
    } catch(err) { console.error(err); }
    finally { setIsExpanding(false); }
  }, [rebuildGraph]);

  // ── Drill OUT (back up) ──────────────────────────────────────────
  const drillOut = useCallback(() => {
    const stack = viewStackRef.current;
    if (stack.length <= 1) return;
    stack.pop();
    viewStackRef.current = [...stack];
    const level = stack[stack.length-1];
    setBreadcrumbs(stack.map(l=>({id:l.id,label:l.label})));
    rebuildGraph(level.nodes, level.links, true);
  }, [rebuildGraph]);

  // ── Drill to specific breadcrumb level ─────────────────────────
  const drillTo = useCallback((idx) => {
    const stack = viewStackRef.current;
    if (idx >= stack.length-1) return;

    const msg = userMsg.toLowerCase();
    const isSurgical = msg.includes("promote") || msg.includes("move") ||
      msg.includes("connect") || msg.includes("link") || msg.includes("add to main") ||
      msg.includes("extract") || msg.includes("bring") || msg.includes("demote");
    if (!isSurgical) return;
    try {
      const nodeList = nodes.map(n => '"'+n.id+'":"'+n.label+'"').join(", ");
      const subList = [];
      subBrainCacheRef.current.forEach((brain, pid) => {
        brain.nodes.forEach(n => { if (!n.isHub) subList.push('"'+n.id+'":"'+n.label+'" (sub:'+pid+')'); });
      });
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+window.__ATLAS_KEY__},
        body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:300,
          messages:[
            {role:"system",content:'Interpret this graph operation. Return ONLY JSON: {"operation":"promote|connect|demote","nodeId":"exact-id","targetId":"exact-id-or-null","label":"verb","reason":"one sentence"} or {"operation":"unclear"}'},
            {role:"user",content:'Command: "'+userMsg+'"\nMain nodes: {'+nodeList+'}\nSub-brain nodes: ['+subList.join(", ")+']'}
          ]})
      });
      const data = await res.json();
      const raw = data.choices?.[0]?.message?.content || "";
      const match = raw.match(/\{[\s\S]*\}/);
      if (!match) return;
      const op = JSON.parse(match[0]);
      if (!op || op.operation === "unclear") return;

      const curNodes = [...graphNodesRef.current];
      const curLinks = [...(viewStackRef.current[0].links || [])];

      if (op.operation === "promote") {
        let found = null;
        subBrainCacheRef.current.forEach((brain) => {
          const n = brain.nodes.find(n => n.id === op.nodeId);
          if (n && !n.isHub) found = {...n};
        });
        if (!found) return;
        if (!curNodes.find(n => n.id === found.id)) curNodes.push(found);
        const tgt = op.targetId || "second-brain";
        const key = found.id+"--"+tgt;
        const existing = new Set(curLinks.map(l => {
          const s = typeof l.source==="object"?l.source.id:l.source;
          const t = typeof l.target==="object"?l.target.id:l.target;
          return s+"--"+t;
        }));
        if (!existing.has(key)) curLinks.push({source:found.id, target:tgt, label:op.label||"connects to"});
        graphNodesRef.current = curNodes;
        viewStackRef.current[0].nodes = curNodes;
        viewStackRef.current[0].links = curLinks;
        rebuildGraph(curNodes, curLinks, false);
        if (saveBrainRef.current) saveBrainRef.current(curNodes, curLinks);
        setAutoLearnLog(prev => ["⟡ Promoted: "+found.label+" → main brain", ...prev.slice(0,3)]);

      } else if (op.operation === "connect") {
        const s = op.nodeId, t = op.targetId;
        if (!s || !t) return;
        const existing = new Set(curLinks.map(l => {
          const sl = typeof l.source==="object"?l.source.id:l.source;
          const tl = typeof l.target==="object"?l.target.id:l.target;
          return sl+"--"+tl;
        }));
        if (!existing.has(s+"--"+t)) {
          curLinks.push({source:s, target:t, label:op.label||"connects to"});
          viewStackRef.current[0].links = curLinks;
          rebuildGraph(curNodes, curLinks, false);
          if (saveBrainRef.current) saveBrainRef.current(curNodes, curLinks);
          const sL = curNodes.find(n=>n.id===s)?.label||s;
          const tL = curNodes.find(n=>n.id===t)?.label||t;
          setAutoLearnLog(prev => ["⟡ Connected: "+sL+" → "+tL, ...prev.slice(0,3)]);
        }

      } else if (op.operation === "demote") {
        const filtered = curNodes.filter(n => n.id !== op.nodeId);
        const filteredLinks = curLinks.filter(l => {
          const s = typeof l.source==="object"?l.source.id:l.source;
          const t = typeof l.target==="object"?l.target.id:l.target;
          return s !== op.nodeId && t !== op.nodeId;
        });
        graphNodesRef.current = filtered;
        viewStackRef.current[0].nodes = filtered;
        viewStackRef.current[0].links = filteredLinks;
        rebuildGraph(filtered, filteredLinks, false);
        if (saveBrainRef.current) saveBrainRef.current(filtered, filteredLinks);
        const dL = curNodes.find(n=>n.id===op.nodeId)?.label||op.nodeId;
        setAutoLearnLog(prev => ["⟡ Demoted: "+dL+" from main brain", ...prev.slice(0,3)]);
      }
    } catch(e) { console.error("surgical:", e); }
  }, [rebuildGraph]);

  const toggleListen=()=>{ if(!voiceSupported) return; if(isListening){recognitionRef.current?.stop();setIsListening(false);}else{setView("chat");recognitionRef.current?.start();setIsListening(true);} };
  const speak=(text)=>{ if(!voiceEnabled||!window.speechSynthesis||!voiceSupported) return; window.speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text.slice(0,350));u.rate=0.93;u.pitch=0.82;u.volume=0.88;const v=window.speechSynthesis.getVoices();const p=v.find(x=>x.name.includes("Google UK English Male")||x.name.includes("Daniel")||x.name.includes("Alex"));if(p)u.voice=p;window.speechSynthesis.speak(u); };

  // ── Inject knowledge ────────────────────────────────────────────
  const addKnowledge = async () => {
    if(!inputText.trim()||isProcessing) return;
    setIsProcessing(true);
    const level = viewStackRef.current[viewStackRef.current.length-1];
    const cur = level.nodes;
    const existingIds=cur.map(n=>n.id).join(", ");
    const existingLabels=cur.map(n=>`"${n.id}":"${n.label}"`).join(", ");
    const context = viewStackRef.current.length>1 ? `You are inside the sub-brain for "${level.label}". ` : "";
    try {
      const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+window.__ATLAS_KEY__},body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:1000,
        system:`${context}You are a knowledge graph extractor. Return ONLY valid JSON. Format: {"nodes":[{"id":"kebab-case-id","label":"1-3 Word Name","group":0,"description":"one sentence"}],"links":[{"source":"id","target":"id","label":"verb"}]}
Rules: Extract 2-6 NEW concepts NOT in [${existingIds}]. Create 2-8 links to new AND existing nodes {${existingLabels}}. Groups: 0=systems,1=tech,2=cognition,3=knowledge,4=tools,5=concepts,6=people,7=science. Labels MAX 3 words. Return ONLY JSON.`,
        messages:[{role:"user",content:inputText}]})});
      const data=await res.json();
      const raw=data.choices?.[0]?.message?.content||"";
      const match=raw.match(/\{[\s\S]*\}/); if(!match) throw new Error("No JSON");
      const parsed=JSON.parse(match[0]);
      const existingIdSet=new Set(cur.map(n=>n.id));
      const parsedNew=(parsed.nodes||[]).filter(n=>!existingIdSet.has(n.id));
      const newNodes=[...cur,...parsedNew];
      const existingLinkKeys=new Set(simLinksRef.current.map(l=>`${l.source}--${l.target}`));
      const newLinks=[...simLinksRef.current,...(parsed.links||[]).filter(l=>!existingLinkKeys.has(`${l.source}--${l.target}`))];
      // Update this level in the stack
      level.nodes=newNodes; level.links=newLinks;
      rebuildGraph(newNodes,newLinks,false);
      saveBrain(newNodes,newLinks);
      setInputText(""); setView("graph");
    } catch(err){console.error(err);}
    finally{setIsProcessing(false);}
  };

  // ── Chat ────────────────────────────────────────────────────────
  const sendChat = async () => {
    const msg=chatInput.trim(); if(!msg||isProcessing) return;
    const userMsg={role:"user",content:msg};
    const history=[...messages,userMsg];
    setMessages(history);setChatInput("");setIsProcessing(true);
    try {
      // Always fetch fresh real-time context so time+weather is never stale
      const liveCtx = await fetchRealTimeCtx();
      const level=viewStackRef.current[viewStackRef.current.length-1];
      const depth=viewStackRef.current.length>1?`Currently exploring the sub-brain of "${level.label}". `:"";
      const nodes=level.nodes;
      const nodesSummary=nodes.map(n=>`• ${n.label}: ${n.description||""}`).join("\n");
      const linksSummary=simLinksRef.current.map(l=>{const sL=nodes.find(n=>n.id===l.source)?.label||l.source;const tL=nodes.find(n=>n.id===l.target)?.label||l.target;return `  ${sL} → [${l.label||"connects"}] → ${tL}`;}).join("\n");
      const sysMsg = "You are Atlas, the intellectual core of this person's second brain. Character: calm, precise, deeply intelligent, occasionally dry and witty. Speak as a genuine equal — direct, never subservient. Challenge assumptions. Surface non-obvious connections. Be genuinely curious. "+depth+"You have real-time awareness of time and weather — use naturally when relevant. CRITICAL HONESTY RULE: Never state something as fact unless you are certain. When uncertain say so plainly. Never fabricate. A wrong confident answer is worse than an honest uncertain one.\n\n"+liveCtx+"\n\nKNOWLEDGE:\n"+nodesSummary+"\n\nCONNECTIONS:\n"+linksSummary;
      const body={model:"llama-3.3-70b-versatile",max_tokens:1000,
        messages:[{role:"system",content:sysMsg},...history.map(m=>({role:m.role,content:m.content}))]};
      const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+window.__ATLAS_KEY__},body:JSON.stringify(body)});
      const data=await res.json();
      const reply=data.choices?.[0]?.message?.content||"No response.";
      setMessages([...history,{role:"assistant",content:reply}]);
      speak(reply);
      if (reply && reply !== "No response.") {
        const rn = viewStackRef.current[0].nodes;
        const rl = viewStackRef.current[0].links || simLinksRef.current;
        setTimeout(() => learnFromConversation(msg, reply, rn, rl), 1500);
        executeSurgical(msg, rn, rl);
      }
    } catch(err){setMessages([...history,{role:"assistant",content:"Connection error. Retry."}]);}
    finally{setIsProcessing(false);}
  };

  const nodeColor = selectedNode ? PALETTE[selectedNode.group%PALETTE.length] : "#00d4ff";
  const isInsideSubBrain = breadcrumbs.length > 1;

  return (
    <div style={{background:"#020712",height:"100vh",color:"#e2e8f0",fontFamily:"'Courier New',Courier,monospace",display:"flex",flexDirection:"column",overflow:"hidden",userSelect:"none"}}>

      {!bootDone&&(<div style={{position:"fixed",inset:0,background:"#020712",zIndex:100,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
        <div style={{fontSize:30,letterSpacing:16,color:"#00d4ff",fontWeight:"bold",textShadow:"0 0 40px #00d4ff88"}}>A T L A S</div>
        <div style={{fontSize:8,color:"#1e3a5f",letterSpacing:4}}>NEURAL SYSTEMS INITIALISING</div>
        <div style={{display:"flex",gap:6,marginTop:8}}>{[0,1,2,3,4].map(i=><div key={i} style={{width:4,height:4,borderRadius:"50%",background:"#00d4ff",animation:`blink ${0.5+i*0.1}s ease-in-out infinite`,animationDelay:`${i*0.1}s`}}/>)}</div>
      </div>)}

      {/* Header */}
      <div style={{padding:"7px 14px",borderBottom:"1px solid rgba(0,212,255,0.09)",display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(0,0,0,0.6)",backdropFilter:"blur(14px)",flexShrink:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{display:"flex",gap:4}}>{[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:i===0?"#00d4ff":i===1?"#a78bfa":"#34d399",boxShadow:`0 0 ${6+i*2}px ${i===0?"#00d4ff":i===1?"#a78bfa":"#34d399"}`,animation:`blink ${1.5+i*0.4}s ease-in-out infinite`}}/>)}</div>
          <span style={{color:"#00d4ff",fontSize:11,letterSpacing:5,fontWeight:"bold"}}>A T L A S</span>
          <span style={{color:"#1e3a5f",fontSize:8,letterSpacing:1}}>v9.1</span>
          {isAutoLearning&&<span style={{fontSize:7,color:"#a78bfa",letterSpacing:1,animation:"blink 0.6s ease-in-out infinite"}}>⟡ LEARNING</span>}
          {isRestructuring&&<span style={{fontSize:7,color:"#fbbf24",letterSpacing:1,animation:"blink 0.4s ease-in-out infinite"}}>⟡ THINKING</span>}
          <button onClick={()=>{console.log("META clicked, isRestructuring:",isRestructuring,"isAutoLearning:",isAutoLearning); restructureBrain();}} disabled={isRestructuring} title="Metacognition: rebuild optimal hierarchy" style={{background:"none",border:"1px solid rgba(251,191,36,0.25)",borderRadius:3,cursor:isRestructuring?"not-allowed":"pointer",padding:"1px 6px",color:isRestructuring?"#334155":"#fbbf24",fontSize:7,letterSpacing:1,fontFamily:"inherit"}}>META</button>
          <span style={{fontSize:7,letterSpacing:1,color:syncStatus==="saving"?"#fbbf24":syncStatus==="synced"?"#34d399":"#1e3a5f",transition:"color 0.4s"}}>
            {syncStatus==="saving"?"● SAVING":syncStatus==="synced"?"● SAVED":"● LOADING"}
          </span>
        </div>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <button onClick={()=>setSearchEnabled(v=>!v)} style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex",alignItems:"center",gap:4}}><div style={{width:5,height:5,borderRadius:"50%",background:searchEnabled?"#34d399":"#1e3a5f",boxShadow:searchEnabled?"0 0 7px #34d399":"none"}}/><span style={{fontSize:7,color:searchEnabled?"#34d399":"#1e3a5f",letterSpacing:1}}>WEB</span></button>
          {typeof window.__ATLAS_KEY__ !== "undefined" && <button onClick={()=>{if(window.confirm("Reset API key?")){localStorage.removeItem("atlas_key");location.reload();}}} style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:7,color:"#334155",letterSpacing:1}}>KEY</span></button>}
          {voiceSupported&&(<button onClick={()=>setVoiceEnabled(v=>!v)} style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex",alignItems:"center",gap:4}}><div style={{width:5,height:5,borderRadius:"50%",background:voiceEnabled?"#fbbf24":"#1e3a5f",boxShadow:voiceEnabled?"0 0 7px #fbbf24":"none"}}/><span style={{fontSize:7,color:voiceEnabled?"#fbbf24":"#1e3a5f",letterSpacing:1}}>{voiceEnabled?"MUTE":"UNMUTE"}</span></button>)}
          <span style={{fontSize:8,color:"#1e3a5f",letterSpacing:1}}>N<span style={{color:"#00d4ff"}}>{stats.nodes}</span> L<span style={{color:"#a78bfa"}}>{stats.links}</span></span>
        </div>
      </div>

      {/* Breadcrumb trail */}
      <div style={{padding:"5px 14px",background:"rgba(0,0,0,0.4)",borderBottom:"1px solid rgba(0,212,255,0.06)",display:"flex",alignItems:"center",gap:0,flexShrink:0,overflowX:"auto",minHeight:28}}>
        {breadcrumbs.map((crumb,i)=>(
          <div key={crumb.id} style={{display:"flex",alignItems:"center",gap:0}}>
            {i>0&&<span style={{color:"#1e3a5f",fontSize:9,margin:"0 6px"}}>›</span>}
            <button onClick={()=>drillTo(i)} disabled={i===breadcrumbs.length-1}
              style={{background:"none",border:"none",cursor:i===breadcrumbs.length-1?"default":"pointer",padding:"2px 4px",borderRadius:3,fontFamily:"inherit",fontSize:9,letterSpacing:2,color:i===breadcrumbs.length-1?"#00d4ff":"#2d4a6a",fontWeight:i===breadcrumbs.length-1?"bold":"normal",transition:"color 0.2s"}}
              onMouseEnter={e=>{if(i<breadcrumbs.length-1)e.target.style.color="#00d4ff";}}
              onMouseLeave={e=>{if(i<breadcrumbs.length-1)e.target.style.color="#2d4a6a";}}>
              {crumb.label.toUpperCase()}
            </button>
          </div>
        ))}
      </div>

      {/* 3D viewport */}
      <div style={{flex:1,position:"relative",overflow:"hidden"}}>
        <div ref={mountRef} style={{width:"100%",height:"100%",cursor:view==="graph"?"grab":"default",touchAction:"none"}}
          onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerLeave={onPointerUp}
          onWheel={onWheel} onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}

        {/* Back button (when inside sub-brain) */}
        {isInsideSubBrain&&view==="graph"&&(
          <button onClick={drillOut} style={{position:"absolute",top:10,left:12,padding:"6px 12px",background:"rgba(0,212,255,0.07)",border:"1px solid rgba(0,212,255,0.2)",color:"#00d4ff",borderRadius:20,cursor:"pointer",fontFamily:"inherit",fontSize:9,letterSpacing:2,display:"flex",alignItems:"center",gap:6,zIndex:6}}>
            ← BACK
          </button>
        )}

        {/* Expanding overlay */}
        {isExpanding&&(
          <div style={{position:"absolute",inset:0,background:"rgba(2,7,18,0.85)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,zIndex:10}}>

        {/* Node info card */}
        {selectedNode&&(
          <div style={{position:"absolute",bottom:64,left:12,background:"rgba(2,7,18,0.96)",border:`1px solid ${nodeColor}`,borderRadius:8,padding:"10px 14px",maxWidth:235,boxShadow:`0 0 28px ${nodeColor}1a`,zIndex:5}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:5}}>

              <button onClick={()=>setSelectedNode(null)} style={{color:"#334155",background:"none",border:"none",cursor:"pointer",fontSize:10,padding:0,fontFamily:"inherit"}}>✕</button>

              <button onClick={()=>drillInto(selectedNode)} disabled={isExpanding}
                style={{flex:1,padding:"6px 8px",background:`${nodeColor}18`,border:`1px solid ${nodeColor}44`,color:nodeColor,borderRadius:4,cursor:"pointer",fontFamily:"inherit",fontSize:8,letterSpacing:2}}>
                {isExpanding?"GENERATING...":"⬡ EXPAND"}
              </button>
              <button onClick={()=>{setView("chat");setChatInput(`Tell me about ${selectedNode.label} and its connections`);}}
                style={{flex:1,padding:"6px 8px",background:"rgba(167,139,250,0.1)",border:"1px solid rgba(167,139,250,0.25)",color:"#a78bfa",borderRadius:4,cursor:"pointer",fontFamily:"inherit",fontSize:8,letterSpacing:2}}>
                ⟡ QUERY
              </button>
            </div>
          </div>
        )}

        {transcript&&(<div style={{position:"absolute",top:12,left:"50%",transform:"translateX(-50%)",background:"rgba(248,113,113,0.08)",border:"1px solid rgba(248,113,113,0.25)",borderRadius:20,padding:"6px 14px",fontSize:10,color:"#fca5a5",fontStyle:"italic",whiteSpace:"nowrap"}}>"{transcript}"</div>)}

        {/* Panel overlay */}
        {view!=="graph"&&(
          <div style={{position:"fixed",top:0,left:0,right:0,bottom:56,background:"rgba(2,7,18,0.97)",backdropFilter:"blur(28px)",display:"flex",flexDirection:"column",zIndex:8}}>
            <div style={{padding:"11px 16px",borderBottom:"1px solid rgba(0,212,255,0.07)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{color:"#00d4ff",fontSize:9,letterSpacing:3}}>
                {view==="add"?`// INJECT${isInsideSubBrain?` INTO ${breadcrumbs[breadcrumbs.length-1].label.toUpperCase()}`:" KNOWLEDGE"}` :"// QUERY ATLAS"}
              </span>
              <button onClick={()=>setView("graph")} style={{color:"#334155",background:"none",border:"none",cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>✕</button>
            </div>

            {view==="add"&&(
              <div style={{flex:1,display:"flex",flexDirection:"column",padding:"14px 16px",gap:10}}>
                {isInsideSubBrain&&<div style={{fontSize:9,color:"#34d399",letterSpacing:2,padding:"4px 8px",background:"rgba(52,211,153,0.05)",border:"1px solid rgba(52,211,153,0.12)",borderRadius:4}}>DEPTH: {breadcrumbs.map(b=>b.label).join(" › ")}</div>}
                <p style={{fontSize:10,color:"#2d4a6a",lineHeight:1.85,margin:0}}>Paste notes or concepts. Atlas extracts nodes and wires them into {isInsideSubBrain?`the ${breadcrumbs[breadcrumbs.length-1].label} sub-brain`:"your main brain"}.</p>
                <textarea value={inputText} onChange={e=>setInputText(e.target.value)} placeholder={"e.g. 'Quantum entanglement shows two particles can be correlated regardless of distance...'"} style={{flex:1,background:"rgba(0,212,255,0.025)",border:"1px solid rgba(0,212,255,0.1)",borderRadius:6,padding:"11px",color:"#cbd5e1",fontSize:11,fontFamily:"inherit",resize:"none",outline:"none",lineHeight:1.85,minHeight:100}} onFocus={e=>{e.target.style.borderColor="rgba(0,212,255,0.26)";}} onBlur={e=>{e.target.style.borderColor="rgba(0,212,255,0.1)";}}/>
                <button onClick={addKnowledge} disabled={isProcessing||!inputText.trim()} style={{padding:"12px",background:isProcessing?"rgba(0,212,255,0.02)":"rgba(0,212,255,0.08)",border:`1px solid rgba(0,212,255,${isProcessing?"0.1":"0.26"})`,color:isProcessing?"#1e4a6e":"#00d4ff",borderRadius:6,cursor:(isProcessing||!inputText.trim())?"not-allowed":"pointer",fontFamily:"inherit",fontSize:9,letterSpacing:3,textTransform:"uppercase"}}>
                  {isProcessing?"⟳  EXTRACTING...":"⟡  INJECT INTO BRAIN"}
                </button>

            {view==="chat"&&(
              <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
                <div style={{flex:1,overflowY:"auto",padding:"12px 16px",display:"flex",flexDirection:"column",gap:10}}>
                  {messages.map((m,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                      {m.role==="assistant"&&<div style={{width:15,height:15,borderRadius:"50%",background:"#a78bfa15",border:"1px solid #a78bfa30",flexShrink:0,marginRight:7,marginTop:2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:"#a78bfa"}}>⟡</div>}
                      <div style={{maxWidth:"86%",padding:"9px 12px",borderRadius:m.role==="user"?"10px 10px 2px 10px":"2px 10px 10px 10px",background:m.role==="user"?"rgba(0,212,255,0.06)":"rgba(167,139,250,0.05)",border:`1px solid ${m.role==="user"?"rgba(0,212,255,0.16)":"rgba(167,139,250,0.12)"}`,fontSize:11,lineHeight:1.8,color:m.role==="user"?"#94a3b8":"#c4b5fd"}}>{m.content}</div>
                    </div>
                  ))}
                  {isProcessing&&(<div style={{display:"flex",gap:8,alignItems:"center",color:"#a78bfa",fontSize:9,letterSpacing:2,opacity:0.5}}><span>⟳</span><span>ATLAS THINKING</span><div style={{display:"flex",gap:3}}>{[0,1,2].map(i=><div key={i} style={{width:3,height:3,borderRadius:"50%",background:"#a78bfa",animation:`blink ${0.65+i*0.15}s ease-in-out infinite`}}/>)}</div></div>)}
                  <div ref={chatBottomRef}/>
                </div>
                <div style={{padding:"9px 12px",borderTop:"1px solid rgba(0,212,255,0.06)",display:"flex",gap:7}}>
                  {voiceSupported&&(<button onClick={toggleListen} style={{padding:"9px 11px",background:isListening?"rgba(248,113,113,0.12)":"rgba(248,113,113,0.05)",border:`1px solid rgba(248,113,113,${isListening?"0.38":"0.16"})`,color:isListening?"#f87171":"#3d5166",borderRadius:6,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{isListening?"⬛":"🎙"}</button>)}
                  <input value={transcript||chatInput} onChange={e=>{if(!isListening)setChatInput(e.target.value);}} onKeyDown={e=>{if(e.key==="Enter")sendChat();}} placeholder={isListening?"Listening...":"Ask Atlas anything..."} style={{flex:1,padding:"9px 11px",background:"rgba(0,212,255,0.025)",border:"1px solid rgba(0,212,255,0.09)",borderRadius:6,color:"#e2e8f0",fontSize:11,fontFamily:"inherit",outline:"none"}} onFocus={e=>{e.target.style.borderColor="rgba(0,212,255,0.22)";}} onBlur={e=>{e.target.style.borderColor="rgba(0,212,255,0.09)";}}/>
                  <button onClick={sendChat} disabled={isProcessing} style={{padding:"9px 14px",background:"rgba(167,139,250,0.08)",border:"1px solid rgba(167,139,250,0.2)",color:"#a78bfa",borderRadius:6,cursor:isProcessing?"wait":"pointer",fontFamily:"inherit",fontSize:13}}>→</button>
                </div>
              </div>
            )}
          </div>
        )}

        <div style={{position:"fixed",bottom:0,left:0,right:0,height:56,display:"flex",alignItems:"stretch",borderTop:"1px solid rgba(0,212,255,0.07)",background:"rgba(2,7,18,0.97)",backdropFilter:"blur(20px)",zIndex:999}}>
          {[{id:"graph",label:"⬡  GRAPH"},{id:"add",label:"+  INJECT"},{id:"chat",label:"⟡  QUERY"}].map(tab=>(
            <button key={tab.id} onClick={()=>setView(tab.id)} style={{flex:1,background:"transparent",border:"none",borderTop:`2px solid ${view===tab.id?"#00d4ff":"transparent"}`,color:view===tab.id?"#00d4ff":"#2d4a6a",cursor:"pointer",fontFamily:"inherit",fontSize:9,letterSpacing:2,transition:"all 0.2s",paddingTop:2}}>{tab.label}</button>
          ))}
        </div>
      </div>

      <style>{`
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.12}}
        *{box-sizing:border-box}
        ::-webkit-scrollbar{width:2px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.08);border-radius:2px}
      `}</style>
    </div>
  );
}

</script>

<script>
// Service worker for PWA
if ('serviceWorker' in navigator) {
  const sw = `
    const C='atlas-v9';
    self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['.'])));self.skipWaiting();});
    self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});
    self.addEventListener('fetch',e=>{if(e.request.url.includes('groq')||e.request.url.includes('supabase')||e.request.url.includes('meteo'))return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('.'))));});
  `;
  const blob = new Blob([sw], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

// PWA install prompt
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(() => {
    const b = document.getElementById('installBanner');
    if (b && deferredPrompt) b.style.display = 'flex';
  }, 3000);
});
window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  const b = document.getElementById('installBanner');
  if (b) b.style.display = 'none';
});
function installAtlas() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      const b = document.getElementById('installBanner');
      if (b) b.style.display = 'none';
    });
  }
}
</script>

<div id="installBanner" style="display:none;position:fixed;bottom:60px;left:12px;right:12px;background:rgba(2,7,18,0.97);border:1px solid rgba(0,212,255,0.3);border-radius:10px;padding:12px 16px;font-family:'Courier New',monospace;z-index:9999;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 0 30px rgba(0,212,255,0.15)">
  <div><div style="color:#00d4ff;font-size:10px;letter-spacing:2px;font-weight:bold">INSTALL ATLAS</div><div style="color:#334155;font-size:9px;margin-top:2px">Add to home screen</div></div>
  <div style="display:flex;gap:8px">
    <button onclick="document.getElementById('installBanner').style.display='none'" style="padding:6px 10px;background:none;border:1px solid #1e3a5f;color:#334155;border-radius:5px;cursor:pointer;font-family:'Courier New',monospace;font-size:9px">LATER</button>
    <button onclick="installAtlas()" style="padding:6px 12px;background:rgba(0,212,255,0.12);border:1px solid rgba(0,212,255,0.35);color:#00d4ff;border-radius:5px;cursor:pointer;font-family:'Courier New',monospace;font-size:9px">INSTALL</button>
  </div>
</div>

</body>
